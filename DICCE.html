<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DICE Model • Analisador de Projetos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1300px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
        }

        /* Painel Esquerdo - Inputs */
        .panel-left {
            flex: 1;
            min-width: 320px;
            background: #f8fafc;
            padding: 30px;
            border-right: 1px solid #e2e8f0;
        }

        .panel-right {
            flex: 2;
            min-width: 600px;
            padding: 30px;
            background: white;
        }

        h1 {
            font-size: 28px;
            color: #1e293b;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h1 span {
            background: #0b8a7a;
            color: white;
            font-size: 14px;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .subtitle {
            color: #64748b;
            margin-bottom: 30px;
            font-size: 15px;
            border-left: 4px solid #0b8a7a;
            padding-left: 15px;
        }

        /* Cards de Input */
        .input-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 15px;
        }

        .input-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-item label {
            font-weight: 600;
            color: #334155;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-item label span {
            background: #e2e8f0;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 14px;
            color: #475569;
        }

        .input-item select {
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .input-item select:hover {
            border-color: #0b8a7a;
        }

        .input-item select:focus {
            outline: none;
            border-color: #0b8a7a;
            box-shadow: 0 0 0 3px rgba(11,138,122,0.1);
        }

        /* Botões */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: #0b8a7a;
            color: white;
        }

        .btn-primary:hover {
            background: #0a7a6b;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(11,138,122,0.2);
        }

        .btn-secondary {
            background: white;
            color: #334155;
            border: 2px solid #e2e8f0;
        }

        .btn-secondary:hover {
            background: #f8fafc;
            border-color: #94a3b8;
        }

        /* Resultado */
        .result-card {
            background: linear-gradient(135deg, #0b8a7a 0%, #0a7a6b 100%);
            border-radius: 16px;
            padding: 25px;
            margin-top: 25px;
            color: white;
        }

        .result-score {
            font-size: 48px;
            font-weight: 700;
            line-height: 1;
            margin: 10px 0 5px;
        }

        .result-zone {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 15px;
            opacity: 0.95;
        }

        .result-message {
            font-size: 15px;
            line-height: 1.6;
            opacity: 0.9;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 12px;
        }

        /* Gráfico */
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chart-header h2 {
            color: #1e293b;
            font-size: 22px;
        }

        .chart-container {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        canvas {
            width: 100%;
            height: auto;
            max-height: 350px;
        }

        /* Legendas */
        .legend {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .color-dot {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }

        .dot-win { background: #0b8a7a; }
        .dot-worry { background: #d8a300; }
        .dot-woe { background: #c0392b; }

        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
            }
            .panel-right {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Painel Esquerdo - Inputs -->
        <div class="panel-left">
            <h1>
                🎲 DICE Model 
                <span>v2.0</span>
            </h1>
            <div class="subtitle">
                Preencha os fatores DICE (1 a 4) para analisar a probabilidade de sucesso do seu projeto
            </div>

            <div class="input-card">
                <div class="input-grid">
                    <div class="input-item">
                        <label>
                            <span>D</span>
                            Duração
                        </label>
                        <select id="D">
                            <option value="1">1 - Muito curta</option>
                            <option value="2" selected>2 - Curta</option>
                            <option value="3">3 - Longa</option>
                            <option value="4">4 - Muito longa</option>
                        </select>
                    </div>

                    <div class="input-item">
                        <label>
                            <span>I</span>
                            Integridade
                        </label>
                        <select id="I">
                            <option value="1">1 - Muito alta</option>
                            <option value="2" selected>2 - Alta</option>
                            <option value="3">3 - Baixa</option>
                            <option value="4">4 - Muito baixa</option>
                        </select>
                    </div>

                    <div class="input-item">
                        <label>
                            <span>C1</span>
                            Comprometimento
                        </label>
                        <select id="C1">
                            <option value="1">1 - Muito alto</option>
                            <option value="2" selected>2 - Alto</option>
                            <option value="3">3 - Baixo</option>
                            <option value="4">4 - Muito baixo</option>
                        </select>
                    </div>

                    <div class="input-item">
                        <label>
                            <span>C2</span>
                            Esforço
                        </label>
                        <select id="C2">
                            <option value="1">1 - Muito baixo</option>
                            <option value="2" selected>2 - Baixo</option>
                            <option value="3">3 - Alto</option>
                            <option value="4">4 - Muito alto</option>
                        </select>
                    </div>

                    <div class="input-item" style="grid-column: span 2;">
                        <label>
                            <span>E</span>
                            Supervisão
                        </label>
                        <select id="E">
                            <option value="1">1 - Muito baixa</option>
                            <option value="2" selected>2 - Baixa</option>
                            <option value="3">3 - Alta</option>
                            <option value="4">4 - Muito alta</option>
                        </select>
                    </div>
                </div>
            </div>

            <button class="btn btn-primary" onclick="atualizarGrafico()">
                🔄 Atualizar Gráfico
            </button>
            
            <button class="btn btn-secondary" onclick="salvarPNG()">
                📸 Salvar como PNG
            </button>

            <!-- Card de Resultado -->
            <div class="result-card" id="resultCard">
                <div style="opacity: 0.8; font-size: 14px;">Score DICE</div>
                <div class="result-score" id="score">14</div>
                <div class="result-zone" id="zone">WORRY</div>
                <div class="result-message" id="message">
                    Zona de atenção. Atue nos fatores para reduzir o escore (meta: 13 ou abaixo).
                </div>
            </div>
        </div>

        <!-- Painel Direito - Gráfico -->
        <div class="panel-right">
            <div class="chart-header">
                <h2>📊 Gráfico DICE</h2>
            </div>
            
            <div class="chart-container">
                <canvas id="diceChart" width="800" height="350"></canvas>
                
                <div class="legend">
                    <div class="legend-item">
                        <div class="color-dot dot-win"></div>
                        <span>WIN (7-13)</span>
                    </div>
                    <div class="legend-item">
                        <div class="color-dot dot-worry"></div>
                        <span>WORRY (14-17)</span>
                    </div>
                    <div class="legend-item">
                        <div class="color-dot dot-woe"></div>
                        <span>WOE (18-28)</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        let chart;

        function calcularScore() {
            const D = parseInt(document.getElementById('D').value);
            const I = parseInt(document.getElementById('I').value);
            const C1 = parseInt(document.getElementById('C1').value);
            const C2 = parseInt(document.getElementById('C2').value);
            const E = parseInt(document.getElementById('E').value);
            
            // Fórmula: D + 2I + 2C1 + C2 + E
            return D + (2 * I) + (2 * C1) + C2 + E;
        }

        function determinarZona(score) {
            if (score >= 7 && score <= 13) return 'WIN';
            if (score >= 14 && score <= 17) return 'WORRY';
            return 'WOE';
        }

        function getMensagem(zone) {
            const mensagens = {
                'WIN': '✅ Alta probabilidade de sucesso! Mantenha a gestão do projeto como está. Continue monitorando os fatores regularmente.',
                'WORRY': '⚠️ Zona de atenção! Atue nos fatores D, I, C1, C2 e E para reduzir o escore. Meta: atingir 13 ou abaixo.',
                'WOE': '🔴 Zona crítica! Reavalie seriamente o projeto. Só prossiga com ações corretivas fortes para reduzir significativamente o escore.'
            };
            return mensagens[zone];
        }

        function getCorZona(zone) {
            const cores = {
                'WIN': '#0b8a7a',
                'WORRY': '#d8a300',
                'WOE': '#c0392b'
            };
            return cores[zone];
        }

        function atualizarResultado() {
            const score = calcularScore();
            const zone = determinarZona(score);
            const mensagem = getMensagem(zone);
            const cor = getCorZona(zone);

            document.getElementById('score').textContent = score;
            document.getElementById('zone').textContent = zone;
            document.getElementById('message').textContent = mensagem;
            
            const resultCard = document.getElementById('resultCard');
            resultCard.style.background = `linear-gradient(135deg, ${cor} 0%, ${ajustarCor(cor, -20)} 100%)`;
        }

        function ajustarCor(hex, percent) {
            // Função simples para escurecer/clarear a cor
            return hex; // Por simplicidade, mantendo a cor base
        }

        function criarGrafico(score) {
            const ctx = document.getElementById('diceChart').getContext('2d');
            
            if (chart) {
                chart.destroy();
            }

            // Dados para as áreas do gráfico
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array.from({length: 22}, (_, i) => i + 7), // 7 a 28
                    datasets: [
                        {
                            label: 'WIN Zone',
                            data: Array.from({length: 22}, (_, i) => {
                                const x = i + 7;
                                if (x <= 13) return 5;
                                return null;
                            }),
                            backgroundColor: '#0b8a7a',
                            fill: true,
                            tension: 0,
                            pointRadius: 0,
                            borderWidth: 0,
                            showLine: false
                        },
                        {
                            label: 'WORRY Zone',
                            data: Array.from({length: 22}, (_, i) => {
                                const x = i + 7;
                                if (x >= 14 && x <= 17) return 5;
                                return null;
                            }),
                            backgroundColor: '#d8a300',
                            fill: true,
                            tension: 0,
                            pointRadius: 0,
                            borderWidth: 0,
                            showLine: false
                        },
                        {
                            label: 'WOE Zone',
                            data: Array.from({length: 22}, (_, i) => {
                                const x = i + 7;
                                if (x >= 18) return 5;
                                return null;
                            }),
                            backgroundColor: '#c0392b',
                            fill: true,
                            tension: 0,
                            pointRadius: 0,
                            borderWidth: 0,
                            showLine: false
                        },
                        {
                            label: 'Score',
                            data: Array(22).fill(null),
                            borderColor: 'black',
                            borderWidth: 2,
                            pointRadius: 8,
                            pointBackgroundColor: 'black',
                            pointBorderColor: 'white',
                            showLine: false,
                            data: Array.from({length: 22}, (_, i) => {
                                return i + 7 === score ? 0.5 : null;
                            })
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            enabled: false
                        }
                    },
                    scales: {
                        y: {
                            min: 0,
                            max: 5,
                            grid: {
                                display: false
                            },
                            ticks: {
                                stepSize: 1,
                                callback: function(value) {
                                    return '';
                                }
                            }
                        },
                        x: {
                            grid: {
                                display: false
                            },
                            title: {
                                display: true,
                                text: 'Score DICE'
                            }
                        }
                    },
                    elements: {
                        line: {
                            tension: 0
                        }
                    },
                    annotation: {
                        annotations: {
                            line1: {
                                type: 'line',
                                xMin: 13.5,
                                xMax: 13.5,
                                borderColor: 'black',
                                borderWidth: 2,
                                borderDash: [5, 5],
                                label: {
                                    content: 'WIN→WORRY',
                                    enabled: true,
                                    position: 'top'
                                }
                            },
                            line2: {
                                type: 'line',
                                xMin: 17.5,
                                xMax: 17.5,
                                borderColor: 'black',
                                borderWidth: 2,
                                borderDash: [5, 5],
                                label: {
                                    content: 'WORRY→WOE',
                                    enabled: true,
                                    position: 'top'
                                }
                            }
                        }
                    }
                }
            });

            // Adicionar texto do score
            const canvas = document.getElementById('diceChart');
            const ctx2 = canvas.getContext('2d');
            
            // Limpar e redesenhar o canvas com Chart.js não é trivial,
            // então vamos usar uma abordagem simplificada
        }

        function atualizarGrafico() {
            const score = calcularScore();
            atualizarResultado();
            
            // Criar novo gráfico com o score
            const canvas = document.getElementById('diceChart');
            const ctx = canvas.getContext('2d');
            
            // Limpar canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Desenhar áreas
            // WIN (7-13)
            ctx.fillStyle = '#0b8a7a';
            ctx.beginPath();
            ctx.moveTo(70, 50);
            ctx.lineTo(270, 50);
            ctx.lineTo(270, 300);
            ctx.lineTo(70, 300);
            ctx.closePath();
            ctx.fill();
            
            // WORRY (14-17)
            ctx.fillStyle = '#d8a300';
            ctx.beginPath();
            ctx.moveTo(290, 50);
            ctx.lineTo(370, 50);
            ctx.lineTo(370, 300);
            ctx.lineTo(290, 300);
            ctx.closePath();
            ctx.fill();
            
            // WOE (18-28)
            ctx.fillStyle = '#c0392b';
            ctx.beginPath();
            ctx.moveTo(390, 50);
            ctx.lineTo(730, 50);
            ctx.lineTo(730, 300);
            ctx.lineTo(390, 300);
            ctx.closePath();
            ctx.fill();
            
            // Desenhar linha divisória
            ctx.strokeStyle = 'black';
            ctx.setLineDash([5, 5]);
            ctx.lineWidth = 2;
            
            // Linha entre WIN e WORRY
            ctx.beginPath();
            ctx.moveTo(280, 50);
            ctx.lineTo(280, 300);
            ctx.stroke();
            
            // Linha entre WORRY e WOE
            ctx.beginPath();
            ctx.moveTo(380, 50);
            ctx.lineTo(380, 300);
            ctx.stroke();
            
            ctx.setLineDash([]);
            
            // Desenhar marcador do score
            const xPos = 70 + ((score - 7) * 30);
            ctx.beginPath();
            ctx.arc(xPos, 175, 10, 0, 2 * Math.PI);
            ctx.fillStyle = 'black';
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // Desenhar texto do score
            ctx.font = 'bold 14px Arial';
            ctx.fillStyle = 'white';
            ctx.textAlign = 'center';
            ctx.fillText(score, xPos, 170);
            
            // Labels das zonas
            ctx.font = 'bold 20px Arial';
            ctx.fillStyle = 'white';
            ctx.fillText('WIN', 170, 180);
            ctx.fillText('WORRY', 330, 180);
            ctx.fillText('WOE', 560, 180);
        }

        function salvarPNG() {
            const canvas = document.getElementById('diceChart');
            const link = document.createElement('a');
            link.download = 'dice-grafico.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // Inicializar com valores padrão
        window.onload = function() {
            atualizarGrafico();
        };
    </script>
</body>
</html>
