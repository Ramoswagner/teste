<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DICE Model • Analisador de Projetos</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.container{
max-width:1200px;
width:100%;
background:white;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.25);
display:flex;
flex-wrap:wrap;
overflow:hidden;
}

.panel-left{
flex:1;
min-width:320px;
padding:30px;
background:#f8fafc;
border-right:1px solid #e2e8f0;
}

.panel-right{
flex:2;
min-width:500px;
padding:30px;
}

h1{
font-size:26px;
margin-bottom:10px;
display:flex;
align-items:center;
gap:10px;
}

.badge{
background:#0b8a7a;
color:white;
padding:4px 10px;
border-radius:20px;
font-size:12px;
}

.subtitle{
color:#64748b;
font-size:14px;
margin-bottom:25px;
border-left:4px solid #0b8a7a;
padding-left:10px;
}

.input-card{
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 4px 8px rgba(0,0,0,0.05);
}

.input-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
}

.input-item{
display:flex;
flex-direction:column;
gap:6px;
}

.input-item label{
font-weight:600;
font-size:14px;
display:flex;
align-items:center;
gap:8px;
}

.tag{
background:#e2e8f0;
width:26px;
height:26px;
display:flex;
align-items:center;
justify-content:center;
border-radius:6px;
font-size:12px;
}

select{
padding:10px;
border-radius:10px;
border:2px solid #e2e8f0;
font-size:15px;
}

select:focus{
outline:none;
border-color:#0b8a7a;
}

.btn{
margin-top:20px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
font-size:15px;
font-weight:600;
cursor:pointer;
}

.btn-primary{
background:#0b8a7a;
color:white;
}

.btn-secondary{
background:white;
border:2px solid #e2e8f0;
margin-top:10px;
}

.result-card{
margin-top:20px;
background:#0b8a7a;
color:white;
padding:20px;
border-radius:12px;
}

.result-score{
font-size:46px;
font-weight:700;
}

.result-zone{
font-size:22px;
margin-bottom:10px;
}

.chart-box{
background:#f8fafc;
padding:20px;
border-radius:14px;
}

canvas{
width:100%;
height:350px;
}

.legend{
display:flex;
justify-content:center;
gap:20px;
margin-top:15px;
font-size:14px;
}

.dot{
width:14px;
height:14px;
border-radius:4px;
display:inline-block;
}

.win{background:#0b8a7a}
.worry{background:#d8a300}
.woe{background:#c0392b}

</style>
</head>


<body>

<div class="container">

<div class="panel-left">

<h1>🎲 DICE Model <span class="badge">v3</span></h1>

<div class="subtitle">
Avaliação de probabilidade de sucesso de projetos
</div>


<div class="input-card">

<div class="input-grid">

<div class="input-item">
<label><span class="tag">D</span>Duração</label>
<select id="D">
<option value="1">1 - Muito curta</option>
<option value="2" selected>2 - Curta</option>
<option value="3">3 - Longa</option>
<option value="4">4 - Muito longa</option>
</select>
</div>

<div class="input-item">
<label><span class="tag">I</span>Integridade</label>
<select id="I">
<option value="1">1 - Muito alta</option>
<option value="2" selected>2 - Alta</option>
<option value="3">3 - Baixa</option>
<option value="4">4 - Muito baixa</option>
</select>
</div>

<div class="input-item">
<label><span class="tag">C1</span>Comprometimento</label>
<select id="C1">
<option value="1">1 - Muito alto</option>
<option value="2" selected>2 - Alto</option>
<option value="3">3 - Baixo</option>
<option value="4">4 - Muito baixo</option>
</select>
</div>

<div class="input-item">
<label><span class="tag">C2</span>Esforço</label>
<select id="C2">
<option value="1">1 - Muito baixo</option>
<option value="2" selected>2 - Baixo</option>
<option value="3">3 - Alto</option>
<option value="4">4 - Muito alto</option>
</select>
</div>

<div class="input-item" style="grid-column:span 2">
<label><span class="tag">E</span>Supervisão</label>
<select id="E">
<option value="1">1 - Muito baixa</option>
<option value="2" selected>2 - Baixa</option>
<option value="3">3 - Alta</option>
<option value="4">4 - Muito alta</option>
</select>
</div>

</div>

<button class="btn btn-primary" onclick="atualizar()">Atualizar análise</button>
<button class="btn btn-secondary" onclick="salvar()">Salvar PNG</button>

</div>

<div class="result-card">

<div>Score DICE</div>
<div class="result-score" id="score"></div>
<div class="result-zone" id="zone"></div>
<div id="message"></div>

</div>

</div>


<div class="panel-right">

<h2 style="margin-bottom:15px;">📊 Distribuição de risco</h2>

<div class="chart-box">
<canvas id="grafico"></canvas>

<div class="legend">
<div><span class="dot win"></span> WIN (7-13)</div>
<div><span class="dot worry"></span> WORRY (14-17)</div>
<div><span class="dot woe"></span> WOE (18-28)</div>
</div>

</div>

</div>

</div>



<script>

const canvas = document.getElementById("grafico")
const ctx = canvas.getContext("2d")

function calcular(){

const D=parseInt(document.getElementById("D").value)
const I=parseInt(document.getElementById("I").value)
const C1=parseInt(document.getElementById("C1").value)
const C2=parseInt(document.getElementById("C2").value)
const E=parseInt(document.getElementById("E").value)

return D + (2*I) + (2*C1) + C2 + E

}

function zona(score){

if(score<=13) return "WIN"
if(score<=17) return "WORRY"
return "WOE"

}

function mensagem(z){

if(z==="WIN") return "Alta probabilidade de sucesso do projeto."
if(z==="WORRY") return "Projeto apresenta riscos moderados. Monitorar fatores críticos."
return "Zona crítica. Reavaliar estratégia e governança do projeto."

}

function cor(z){

if(z==="WIN") return "#0b8a7a"
if(z==="WORRY") return "#d8a300"
return "#c0392b"

}

function desenhar(score){

const w=canvas.width
const h=canvas.height

ctx.clearRect(0,0,w,h)

const margem=60
const largura=w-(margem*2)

function pos(valor){

return margem + ((valor-7)/(28-7))*largura

}

ctx.fillStyle="#0b8a7a"
ctx.fillRect(pos(7),40,pos(13)-pos(7),h-80)

ctx.fillStyle="#d8a300"
ctx.fillRect(pos(14),40,pos(17)-pos(14),h-80)

ctx.fillStyle="#c0392b"
ctx.fillRect(pos(18),40,pos(28)-pos(18),h-80)

ctx.strokeStyle="black"
ctx.setLineDash([6,6])

ctx.beginPath()
ctx.moveTo(pos(13.5),40)
ctx.lineTo(pos(13.5),h-40)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(pos(17.5),40)
ctx.lineTo(pos(17.5),h-40)
ctx.stroke()

ctx.setLineDash([])

const x=pos(score)

ctx.beginPath()
ctx.arc(x,h/2,10,0,Math.PI*2)
ctx.fillStyle="black"
ctx.fill()

ctx.strokeStyle="white"
ctx.lineWidth=3
ctx.stroke()

ctx.fillStyle="white"
ctx.font="bold 14px Arial"
ctx.textAlign="center"
ctx.fillText(score,x,(h/2)+4)

}

function atualizar(){

const score=calcular()
const z=zona(score)

document.getElementById("score").textContent=score
document.getElementById("zone").textContent=z
document.getElementById("message").textContent=mensagem(z)

document.querySelector(".result-card").style.background=cor(z)

desenhar(score)

}

function salvar(){

const link=document.createElement("a")
link.download="dice-analise.png"
link.href=canvas.toDataURL()
link.click()

}

document.querySelectorAll("select").forEach(el=>{

el.addEventListener("change",atualizar)

})

window.onload=atualizar

</script>

</body>
</html>
